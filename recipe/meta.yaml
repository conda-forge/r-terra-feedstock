{% set version = "1.9-34" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-terra
  version: "{{ version|replace("-", "_") }}"

source:
  url:
    - {{ cran_mirror }}/src/contrib/terra_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/terra/terra_{{ version }}.tar.gz
  sha256: 6bc69994edccb0cf3f7d7a13dacdf5aca5ee8b3f5091e4539deea660abd845ea

build:
  skip: true  # [win or ppc64le]
  number: 1
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
    - r-rcpp                       # [build_platform != target_platform]
    - {{ compiler('c') }}          # [not win]
    - {{ stdlib("c") }}            # [not win]
    - {{ compiler('m2w64_c') }}    # [win]
    - {{ stdlib("c") }}            # [win]
    - {{ compiler('cxx') }}        # [not win]
    - {{ compiler('m2w64_cxx') }}  # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}sed               # [win]
    - {{ posix }}grep              # [win]
    - {{ posix }}autoconf
    - {{ posix }}automake          # [not win]
    - {{ posix }}automake-wrapper  # [win]
    - {{ posix }}pkg-config
    - {{ posix }}make
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
  host:
    - r-base
    - r-rcpp >=1.0_10
    - libgdal-core
    - proj
    - geos
  run:
    - r-base
    - r-rcpp >=1.0_10
    - {{ pin_compatible('proj') }}
    - {{ pin_compatible('libgdal-core') }}

test:
  commands:
    - $R -e "library('terra')"           # [not win]
    - "\"%R%\" -e \"library('terra')\""  # [win]

about:
  home: https://rspatial.github.io/terra/
  dev_url: https://github.com/rspatial/terra
  license: GPL-3.0-or-later
  summary: Methods for spatial data analysis with vector (points, lines, polygons) and raster
    (grid) data. Methods for vector data include geometric operations such as intersect
    and buffer. Raster methods include local, focal, global, zonal and geometric operations.
    The predict and interpolate methods facilitate the use of regression type (interpolation,
    machine learning) models for spatial prediction, including with satellite remote
    sensing data. Processing of very large files is supported. See the manual and tutorials
    on <https://rspatial.org/> to get started.
  license_family: GPL3
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3

extra:
  recipe-maintainers:
    - conda-forge/r
    - TomAugspurger
